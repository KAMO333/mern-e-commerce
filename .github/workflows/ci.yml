name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # We don't need to install Docker or Compose; they are already there.
      # Buildx is useful for faster caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Docker Tests
        run: |
          docker compose -f docker-compose.test.yml up --build --exit-code-from test-runner --abort-on-container-exit

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
